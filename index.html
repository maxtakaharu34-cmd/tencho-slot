<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#0a0010" />
    <title>てんちょースロット</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <!-- Preload reel symbols so the very first paint uses the current assets -->
    <link rel="preload" as="image" href="assets/symbols/7.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/bar.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/bell.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/watermelon.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/cherry.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/replay.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/one.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/three.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/five.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/pierrot.png?v3" />
    <link rel="preload" as="image" href="assets/symbols/gold.png?v3" />
    <style>
      :root {
        --red: #e8133a;
        --red-deep: #a2032a;
        --yellow: #ffe100;
        --pink: #ff4da6;
        --purple: #8b1aff;
        --indigo: #1a0a40;
        --bg: #0a0010;
        --ink: #0a0a0a;
        --paper: #fff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
        font-weight: 700;
        color: #fff;
        background:
          radial-gradient(900px 700px at 10% 10%, rgba(139, 26, 255, 0.35), transparent 60%),
          radial-gradient(900px 700px at 90% 95%, rgba(255, 225, 0, 0.18), transparent 60%),
          radial-gradient(700px 500px at 70% 20%, rgba(255, 77, 166, 0.18), transparent 60%),
          var(--bg);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      /* Star field background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(1px 1px at 20% 30%, #fff 50%, transparent 100%),
          radial-gradient(1px 1px at 60% 70%, #fff 50%, transparent 100%),
          radial-gradient(1px 1px at 80% 10%, #fff 50%, transparent 100%),
          radial-gradient(1.5px 1.5px at 15% 80%, #fff 50%, transparent 100%),
          radial-gradient(1px 1px at 90% 50%, #fff 50%, transparent 100%),
          radial-gradient(1px 1px at 40% 40%, #fff 50%, transparent 100%),
          radial-gradient(1.5px 1.5px at 70% 85%, #fff 50%, transparent 100%);
        background-size: 300px 300px;
        opacity: 0.4;
        pointer-events: none;
        z-index: 0;
        animation: starDrift 60s linear infinite;
      }
      @keyframes starDrift {
        0% { background-position: 0 0; }
        100% { background-position: 300px 300px; }
      }
      #app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: auto auto 1fr auto auto;
        height: 100dvh;
        max-height: 100dvh;
        padding: 8px 12px 8px;
        gap: 6px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .title {
        font-family: "Mochiy Pop P One", "Noto Sans JP", sans-serif;
        font-size: clamp(18px, 4.8vw, 26px);
        color: var(--yellow);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red), 5px 5px 0 #000;
        transform: rotate(-2deg);
        margin: 0;
        line-height: 1;
      }
      .title .dot {
        display: inline-block;
        color: var(--red);
        transform: rotate(4deg) translateY(2px);
      }
      .top-buttons { display: flex; gap: 5px; }
      .icon-btn {
        background: rgba(255,255,255,0.95);
        border: 2.5px solid #000;
        color: #000;
        padding: 4px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: 2px 2px 0 #000;
        transition: transform 0.05s;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #000; }
      .icon-btn img { width: 100%; height: 100%; object-fit: contain; display: block; }
      .mode-icon-img {
        width: 22px;
        height: 22px;
        vertical-align: middle;
        margin-right: 4px;
        object-fit: contain;
      }

      /* Mode bar */
      .mode-bar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 6px;
        align-items: center;
        background: rgba(0,0,0,0.5);
        border: 2.5px solid #000;
        border-radius: 12px;
        padding: 4px 10px;
        box-shadow: 2px 2px 0 #000;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 12px;
      }
      .mode-bar .mode-name {
        color: var(--yellow);
        font-size: 14px;
        text-align: center;
        text-shadow: 2px 2px 0 #000;
      }
      .mode-bar .mode-name.cz { color: var(--pink); }
      .mode-bar .mode-name.at { color: #00f0ff; }
      .mode-bar .mode-name.upper-at {
        background: linear-gradient(90deg, #ff0, #f0f, #0ff, #ff0);
        background-size: 300% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: rainbow 1.6s linear infinite;
      }
      @keyframes rainbow {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
      }
      .mode-bar .mode-counter {
        font-family: "Mochiy Pop P One", monospace;
        color: #fff;
        font-variant-numeric: tabular-nums;
      }

      /* Reel area */
      .reel-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }
      .reel-frame {
        position: relative;
        background: #000;
        border: 4px solid #000;
        border-radius: 16px;
        box-shadow:
          4px 4px 0 #000,
          0 0 0 3px var(--yellow) inset,
          0 0 30px rgba(255, 225, 0, 0.4);
        padding: 8px;
        max-height: 100%;
        max-width: min(96vw, 620px);
        width: 100%;
        margin: 0 auto;
        aspect-ratio: 360 / 320;
        overflow: hidden;
      }
      canvas#reels {
        display: block;
        background: #050010;
        border-radius: 8px;
        height: 100%;
        width: 100%;
      }
      canvas#fx {
        position: absolute;
        inset: 8px;
        pointer-events: none;
        border-radius: 8px;
        width: calc(100% - 16px);
        height: calc(100% - 16px);
      }
      .payline {
        position: absolute;
        left: 8px; right: 8px;
        top: 50%;
        height: 3px;
        background: linear-gradient(90deg, transparent, var(--red), var(--red), transparent);
        transform: translateY(-50%);
        box-shadow: 0 0 8px var(--red);
        pointer-events: none;
      }

      /* Status strip */
      .status-strip {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .stat-card {
        background: rgba(255,255,255,0.95);
        border: 2.5px solid #000;
        border-radius: 12px;
        padding: 4px 8px;
        box-shadow: 2px 2px 0 #000;
        color: #000;
        text-align: center;
      }
      .stat-card.medal { background: var(--yellow); }
      .stat-card.gain { background: var(--pink); color: #fff; }
      .stat-card.game { background: rgba(255,255,255,0.95); }
      .stat-card h3 {
        margin: 0;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 9px;
        letter-spacing: 0.08em;
        line-height: 1.1;
      }
      .stat-card .value {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 18px;
        line-height: 1.05;
        font-variant-numeric: tabular-nums;
      }

      /* Controls */
      .controls {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr 1fr;
        gap: 6px;
      }
      .ctrl-btn {
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 18px;
        font-weight: 900;
        color: #000;
        background: var(--paper);
        border: 3px solid #000;
        border-radius: 14px;
        padding: 12px 0;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
        transition: transform 0.05s, background 0.1s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1px;
        position: relative;
        min-height: 56px;
      }
      .ctrl-btn .lbl {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        opacity: 0.85;
      }
      .ctrl-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
      .ctrl-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: 3px 3px 0 #000;
      }
      .ctrl-btn.lever {
        background: var(--red);
        color: #fff;
        font-size: 22px;
      }
      .ctrl-btn.stop {
        background: var(--yellow);
      }
      /* Push-order navigation indicator — BIG and obvious */
      .ctrl-btn .nav-arrow {
        position: absolute;
        top: -34px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 42px;
        color: var(--yellow);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 0 0 12px var(--yellow), 3px 3px 0 #000;
        animation: navBounceBig 0.45s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 3;
      }
      @keyframes navBounceBig {
        0%   { transform: translateX(-50%) translateY(0) scale(1); }
        100% { transform: translateX(-50%) translateY(-8px) scale(1.12); }
      }
      .ctrl-btn .nav-num {
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--red);
        color: #fff;
        border: 3px solid #000;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 24px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 3px 3px 0 #000, 0 0 18px var(--red);
        z-index: 4;
      }
      /* Next-to-press button: pulsing highlight */
      .ctrl-btn.nav-next {
        background: var(--yellow) !important;
        animation: navBtnPulse 0.6s ease-in-out infinite alternate;
      }
      @keyframes navBtnPulse {
        0%   { box-shadow: 3px 3px 0 #000, 0 0 12px var(--yellow); }
        100% { box-shadow: 3px 3px 0 #000, 0 0 36px #fff176, 0 0 60px #ff6ec7; }
      }
      /* Already-pressed nav slot button: dimmed with check */
      .ctrl-btn.nav-done {
        opacity: 0.45;
        filter: grayscale(0.7);
      }
      .ctrl-btn .nav-check {
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 32px;
        height: 32px;
        background: #00cc66;
        color: #fff;
        border: 3px solid #000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 900;
        box-shadow: 2px 2px 0 #000;
        z-index: 4;
      }

      /* Cut-in (てんちょー) overlay */
      #cutin {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 6;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #cutin.show .cutin-flash { animation: flashBurst 0.5s ease-out forwards; }
      #cutin.show .cutin-stripe { animation: stripeSweep 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
      #cutin.show .cutin-img { animation: slideIn 1.7s cubic-bezier(.15,.8,.2,1) forwards; }
      #cutin.show .cutin-text { animation: textPunch 1.6s cubic-bezier(.15,.85,.25,1) forwards; }
      #cutin.show .cutin-dim { animation: dimPulse 1.5s ease-out forwards; }
      .cutin-flash {
        position: absolute;
        inset: -20%;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255,255,255,1) 0%,
          rgba(255,225,0,0.8) 20%,
          rgba(232,19,58,0.5) 40%,
          transparent 70%
        );
        opacity: 0;
      }
      .cutin-dim {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 40%, transparent 80%);
        opacity: 0;
      }
      .cutin-stripe {
        position: absolute;
        left: -120%;
        top: 0;
        width: 240%;
        height: 100%;
        background: repeating-linear-gradient(
          -15deg,
          var(--red) 0 30px,
          var(--yellow) 30px 60px,
          var(--red) 60px 90px,
          #000 90px 110px
        );
        opacity: 0;
        transform: skewX(-10deg);
      }
      .cutin-img-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        overflow: hidden;
        z-index: 2;
      }
      .cutin-img {
        height: 100%;
        max-height: 100%;
        opacity: 0;
        filter: drop-shadow(-6px 6px 0 #000) drop-shadow(8px 0 0 var(--red));
        transform: translateX(120%) rotate(10deg) scale(0.85);
        transform-origin: center bottom;
      }
      .cutin-text {
        position: absolute;
        left: 50%; top: 50%;
        font-family: "Mochiy Pop P One", sans-serif;
        color: var(--yellow);
        -webkit-text-stroke: 4px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red), 6px 6px 0 #000;
        line-height: 1;
        transform: translate(-50%, -50%) scale(0.4) rotate(-8deg);
        opacity: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        text-align: center;
      }
      .cutin-line1 {
        font-size: clamp(20px, 5vw, 32px);
        transform: rotate(-4deg);
        white-space: nowrap;
      }
      .cutin-line2 {
        font-size: clamp(28px, 7vw, 48px);
        white-space: nowrap;
        color: #fff;
        text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 #000;
        transform: rotate(2deg);
      }

      /* Freeze overlay */
      #freeze {
        position: fixed;
        inset: 0;
        background: #000;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #freeze.show { display: flex; opacity: 1; }
      #freeze .pulse {
        width: 18vmin;
        height: 18vmin;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,55,95,0.7) 0%, transparent 70%);
        animation: pulseBeat 0.8s ease-in-out infinite;
      }
      @keyframes pulseBeat {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50%      { transform: scale(1.1); opacity: 1; }
      }

      /* Animations shared */
      @keyframes flashBurst { 0%{opacity:0;} 15%{opacity:1;} 100%{opacity:0;} }
      @keyframes stripeSweep { 0%{opacity:0;left:-120%;} 15%{opacity:0.9;} 100%{opacity:0;left:120%;} }
      @keyframes slideIn {
        0%   { opacity: 0; transform: translateX(120%) rotate(10deg) scale(0.85); }
        22%  { opacity: 1; transform: translateX(-4%) rotate(-7deg) scale(1.1); }
        38%  { transform: translateX(3%) rotate(3deg) scale(1); }
        55%  { transform: translateX(0) rotate(-2deg) scale(1.03); }
        85%  { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
        100% { opacity: 0; transform: translateX(0) rotate(0deg) scale(1.02); }
      }
      @keyframes textPunch {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3) rotate(-15deg); }
        10%  { opacity: 1; transform: translate(-50%, -50%) scale(1.35) rotate(6deg); }
        20%  { transform: translate(-50%, -50%) scale(0.95) rotate(-4deg); }
        30%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
        45%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        90%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-2deg); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); }
      }
      @keyframes dimPulse { 0%{opacity:0;} 15%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;} }

      /* Reel frame shake */
      .reel-frame.shake { animation: frameShake 0.45s ease-out; }
      @keyframes frameShake {
        0%,100% { transform: translate(0,0); }
        15% { transform: translate(-4px, 2px) rotate(-0.4deg); }
        30% { transform: translate(5px, -2px) rotate(0.3deg); }
        45% { transform: translate(-3px, 3px) rotate(-0.2deg); }
        60% { transform: translate(4px, -1px) rotate(0.2deg); }
        80% { transform: translate(-2px, 1px); }
      }

      /* Floating coin / payout text */
      #floaters {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 4;
      }
      .floater {
        position: absolute;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: clamp(20px, 5vw, 36px);
        color: var(--yellow);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 var(--red);
        transform: translate(-50%, -50%);
        animation: floatUp 1.1s ease-out forwards;
        white-space: nowrap;
      }
      .floater.gain { color: #00f0ff; }
      .floater.bonus { color: var(--pink); }
      @keyframes floatUp {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
        20%  { opacity: 1; transform: translate(-50%, -65%) scale(1.1); }
        100% { opacity: 0; transform: translate(-50%, -140%) scale(0.9); }
      }

      /* Generic overlay (start, share) */
      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.85);
        z-index: 100;
        padding: 20px;
      }
      .overlay.show { display: flex; }
      .overlay .box {
        background: var(--paper);
        border: 4px solid #000;
        border-radius: 18px;
        box-shadow: 6px 6px 0 #000;
        color: #000;
        padding: 22px 26px;
        max-width: 92%;
        max-height: 90vh;
        overflow-y: auto;
        text-align: center;
        transform: rotate(-1.5deg);
      }
      .overlay h2 {
        font-family: "Mochiy Pop P One", sans-serif;
        margin: 0 0 8px;
        font-size: clamp(22px, 6vw, 32px);
        color: var(--red);
        -webkit-text-stroke: 3px #000;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0 #000;
      }
      .overlay p { margin: 6px 0; font-size: 13px; }
      .overlay .actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .overlay button {
        font-family: "Mochiy Pop P One", sans-serif;
        border: 3px solid #000;
        border-radius: 999px;
        padding: 10px 22px;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 3px 3px 0 #000;
      }
      .overlay button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
      .btn-start {
        background: var(--red);
        color: #fff;
        font-size: 22px;
        padding: 14px 30px;
        animation: btnPulse 1.2s ease-in-out infinite;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-start img { width: 28px; height: 28px; object-fit: contain; }
      .btn-share { background: #1da1f2; color: #fff; }
      .btn-close { background: #fff; color: #000; }
      @keyframes btnPulse {
        0%,100% { transform: scale(1) rotate(-1deg); }
        50%     { transform: scale(1.06) rotate(1deg); }
      }
      .qr-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
      }
      .qr-box svg { background: #fff; border: 2px solid #000; border-radius: 6px; }
      .share-url {
        font-family: monospace;
        font-size: 11px;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 4px;
        word-break: break-all;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(30px);
        background: #000;
        color: var(--yellow);
        border: 3px solid var(--yellow);
        padding: 8px 16px;
        border-radius: 999px;
        font-family: "Mochiy Pop P One", sans-serif;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 200;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* AT / Upper-AT mode skin: rainbow aura + intensified background */
      body.mode-at::after,
      body.mode-upperAt::after,
      body.mode-cz::after {
        content: "";
        position: fixed;
        inset: -10%;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(80% 60% at 50% 0%, rgba(0, 240, 255, 0.22), transparent 65%),
          radial-gradient(80% 60% at 50% 100%, rgba(255, 55, 166, 0.22), transparent 65%);
        animation: atPulse 2.4s ease-in-out infinite alternate;
      }
      body.mode-upperAt::after {
        background:
          radial-gradient(60% 50% at 30% 30%, rgba(255, 225, 0, 0.28), transparent 65%),
          radial-gradient(60% 50% at 70% 70%, rgba(255, 0, 255, 0.28), transparent 65%),
          radial-gradient(60% 50% at 50% 50%, rgba(0, 255, 255, 0.22), transparent 70%);
        animation: atRainbow 3s linear infinite;
      }
      @keyframes atPulse {
        from { opacity: 0.55; filter: hue-rotate(0deg); }
        to   { opacity: 1;    filter: hue-rotate(40deg); }
      }
      @keyframes atRainbow {
        0%   { filter: hue-rotate(0deg) saturate(1.3); }
        100% { filter: hue-rotate(360deg) saturate(1.3); }
      }
      /* Reel frame glow intensified in AT / upperAT */
      body.mode-at .reel-frame {
        box-shadow:
          4px 4px 0 #000,
          0 0 0 3px var(--yellow) inset,
          0 0 40px rgba(0, 240, 255, 0.7);
      }
      body.mode-upperAt .reel-frame {
        box-shadow:
          4px 4px 0 #000,
          0 0 0 3px var(--yellow) inset,
          0 0 60px rgba(255, 0, 255, 0.9),
          0 0 100px rgba(255, 225, 0, 0.6);
        animation: upperAtFrame 1.6s ease-in-out infinite alternate;
      }
      @keyframes upperAtFrame {
        from { filter: hue-rotate(0deg) brightness(1); }
        to   { filter: hue-rotate(90deg) brightness(1.25); }
      }
      /* Confetti / sparkle canvas overlay */
      #sparkles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      /* Mobile tweaks */
      @media (max-width: 480px) {
        .ctrl-btn { font-size: 16px; min-height: 48px; padding: 8px 0; }
        .ctrl-btn.lever { font-size: 18px; }
        .stat-card .value { font-size: 16px; }
        #app { padding: 6px 8px; gap: 5px; }
        .title { font-size: clamp(16px, 4.4vw, 22px); }
      }
    </style>
  <style>/* spark-ux-v1 */input:not([type=button]):not([type=submit]):not([readonly]),textarea,select{font-size:16px}html{-webkit-text-size-adjust:100%}body{overscroll-behavior:none}button{touch-action:manipulation}</style>
</head>
  <body>
    <div id="app">
      <header>
        <h1 class="title">てんちょースロット<span class="dot">！</span></h1>
        <div class="top-buttons">
          <button id="btn-mute" class="icon-btn" aria-label="mute"><img id="img-mute" src="assets/ui/mute_on.png?v3" alt="mute" /></button>
          <button id="btn-share" class="icon-btn" aria-label="share"><img src="assets/ui/share.png?v3" alt="share" /></button>
          <button id="btn-restart" class="icon-btn" aria-label="restart"><img src="assets/ui/restart.png?v3" alt="restart" /></button>
        </div>
      </header>

      <div class="mode-bar">
        <div class="mode-name" id="mode-name">通常</div>
        <div class="mode-counter" id="mode-counter"></div>
        <div class="mode-counter" id="mode-extra"></div>
      </div>

      <div class="reel-wrap">
        <div class="reel-frame" id="reel-frame">
          <canvas id="reels" width="360" height="320"></canvas>
          <canvas id="fx" width="360" height="320"></canvas>
          <div class="payline"></div>
          <div id="cutin">
            <div class="cutin-flash"></div>
            <div class="cutin-dim"></div>
            <div class="cutin-stripe"></div>
            <div class="cutin-img-wrap">
              <img class="cutin-img" id="cutin-img" src="assets/ueda.png" alt="てんちょー" />
            </div>
            <div class="cutin-text" id="cutin-text">
              <span class="cutin-line1" id="cutin-line1">てんちょー</span>
              <span class="cutin-line2" id="cutin-line2">CHANCE！</span>
            </div>
          </div>
          <div id="floaters"></div>
        </div>
      </div>

      <div class="status-strip">
        <div class="stat-card medal">
          <h3>MEDAL</h3>
          <div class="value" id="medal">1000</div>
        </div>
        <div class="stat-card game">
          <h3>GAME</h3>
          <div class="value" id="games">0</div>
        </div>
        <div class="stat-card gain">
          <h3>差枚</h3>
          <div class="value" id="diff">+0</div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn lever" id="btn-lever">レバー<span class="lbl">SPIN (Space)</span></button>
        <button class="ctrl-btn stop" id="btn-stop-0" data-reel="0">STOP<span class="lbl">左 (Z)</span></button>
        <button class="ctrl-btn stop" id="btn-stop-1" data-reel="1">STOP<span class="lbl">中 (X)</span></button>
        <button class="ctrl-btn stop" id="btn-stop-2" data-reel="2">STOP<span class="lbl">右 (C)</span></button>
      </div>
    </div>

    <!-- Freeze overlay -->
    <div id="freeze"><div class="pulse"></div></div>

    <!-- Start overlay -->
    <div class="overlay show" id="start-overlay">
      <div class="box">
        <h2>てんちょースロット</h2>
        <p>本格パチスロ風 / フリーズ目指せ！</p>
        <p style="font-size: 11px; opacity: 0.7;">レバー: Space ／ STOP: Z X C</p>
        <div class="actions">
          <button class="btn-start" id="btn-start"><img src="assets/ui/play.png?v3" alt="" /> START</button>
        </div>
      </div>
    </div>

    <!-- Share overlay -->
    <div class="overlay" id="share-overlay">
      <div class="box">
        <h2>シェア</h2>
        <p id="share-text-preview" style="font-size: 12px;"></p>
        <div class="qr-box">
          <div id="qr-code"></div>
          <div class="share-url" id="share-url"></div>
        </div>
        <div class="actions">
          <button class="btn-share" id="btn-share-x">X でシェア</button>
          <button class="btn-close" id="btn-share-close">閉じる</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <!-- Global sparkle / confetti layer for AT mode -->
    <canvas id="sparkles"></canvas>

    <script src="slot.js" defer></script>
  </body>
</html>
